name: shortcut_oregonator_singlehorizon

# Single-horizon ablation: train ONLY at h=64. No multi-horizon ladder.
# Used to demonstrate that step-doubling requires multi-horizon training.
model:
  type: shortcut_oregonator_2d
  channels: 2
  base_ch: 48
  emb_dim: 64
  ch_mults: [1, 2, 4, 4]

dataset:
  train: data/oregonator/oregonator_train.h5
  val:   data/oregonator/oregonator_val.h5
  base_dt: 0.05
  T: 201
  H: 256
  W: 256
  channels: 2

horizon_set: [64]

training:
  memmap_train_path: data/oregonator/oregonator_train_memmap.npy

  batch_size: 8
  samples_per_epoch: 5000
  epochs: 30
  patience: 10

  lr: 2.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_epochs: 3
  checkpoint_every: 5
  seed: 0
  dagger_prob: 0.0

output_dir: checkpoints/oregonator_singlehorizon

wandb:
  enabled: false
